<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><div class="logo">A</div>AITasker</div>
    <nav>
      <a href="/dashboard">Dashboard</a>
      <a href="#" id="logout-link">Logout</a>
    </nav>
  </header>

  <main class="page-center">
    <section class="card" style="max-width:640px">
      <h1>Change Password</h1>
      <form id="change-password-form" class="form">
        <div class="field">
          <label for="current-password">Current Password</label>
          <input id="current-password" name="current_password" type="password" required />
        </div>
        <div class="field">
          <label for="new-password">New Password</label>
          <input id="new-password" name="new_password" type="password" required />
        </div>
        <div class="actions">
          <button type="submit" class="btn">Save Password</button>
        </div>
      </form>
      <div id="change-password-error" class="toast toast-error hidden"></div>
      <div id="change-password-success" class="toast toast-success hidden"></div>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/profile.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      ensureAuthenticated()
      attachLogoutLinks()
      initChangePassword()
    })
  </script>
</body>
</html>
