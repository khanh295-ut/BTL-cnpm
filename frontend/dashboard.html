<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><div class="logo">A</div>AITasker</div>
    <nav>
      <a href="/profile">Profile</a>
      <a href="#" id="logout-link">Logout</a>
    </nav>
  </header>

  <main class="page-center">
    <section class="card" style="max-width:1100px">
      <div class="dashboard-grid">
        <div class="main-col">
          <h1>Welcome</h1>
          <p id="dashboard-welcome">Loading your account...</p>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="value">—</div>
              <div class="label">Projects</div>
            </div>
            <div class="stat-card">
              <div class="value">—</div>
              <div class="label">Proposals</div>
            </div>
            <div class="stat-card">
              <div class="value">—</div>
              <div class="label">Reviews</div>
            </div>
            <div class="stat-card">
              <div class="value">—</div>
              <div class="label">Earnings</div>
            </div>
          </div>

          <div id="dashboard-error" class="toast toast-error hidden"></div>
        </div>

        <aside class="side-card">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <div class="avatar">U</div>
            <div>
              <div style="font-weight:700">Your Account</div>
              <div class="muted" style="font-size:0.95rem">Manage your profile & settings</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <a class="btn-secondary" href="/profile">View Profile</a>
            <a class="btn-secondary" href="/edit-profile">Edit Profile</a>
            <a class="btn-secondary" href="/change-password">Change Password</a>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
