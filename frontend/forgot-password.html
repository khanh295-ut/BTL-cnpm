<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-split">
    <div class="auth-left">
      <div class="logo-large">A</div>
      <h1>AITasker</h1>
      <p>Reset access to your account with a secure one-time link.</p>
      <div class="auth-illustration"></div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-title">Forgot password?</div>
          <div class="auth-sub">Enter your email and we’ll generate a reset token for demo use.</div>
        </div>

        <form id="forgot-password-form" class="form">
          <div class="field">
            <label for="forgot-email">Email</label>
            <div class="input-group">
              <i class="fa fa-envelope input-icon" aria-hidden="true"></i>
              <input id="forgot-email" class="input-with-icon" name="email" type="email" required />
            </div>
          </div>

          <div class="actions auth-actions">
            <button type="submit" class="btn">Send Reset Link</button>
          </div>

          <div class="link-center">
            <a href="index.html">Back to login</a>
          </div>
        </form>

        <div id="forgot-password-error" class="toast toast-error hidden" style="margin-top:16px"></div>
        <div id="forgot-password-success" class="toast toast-success hidden" style="margin-top:16px"></div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
