<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><div class="logo">A</div>AITasker</div>
    <nav>
      <a href="/dashboard">Dashboard</a>
      <a href="#" id="logout-link">Logout</a>
    </nav>
  </header>

  <main class="page-center">
    <section class="card" style="max-width:820px">
      <div class="profile-card">
        <div class="avatar">U</div>
        <div class="profile-info">
          <h2 id="profile-username">&nbsp;</h2>
          <div class="muted" id="profile-email">&nbsp;</div>
          <div style="margin-top:10px" id="profile-fullname">&nbsp;</div>
          <div style="margin-top:8px" id="profile-bio">&nbsp;</div>
        </div>
      </div>

      <div style="margin-top:18px;display:flex;gap:8px">
        <a class="btn-secondary" href="/edit-profile">Edit Profile</a>
        <a class="btn-secondary" href="/change-password">Change Password</a>
      </div>

      <div id="profile-error" class="toast toast-error hidden" style="margin-top:12px"></div>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/profile.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      ensureAuthenticated()
      attachLogoutLinks()
      await loadProfileData()
    })
  </script>
</body>
</html>
