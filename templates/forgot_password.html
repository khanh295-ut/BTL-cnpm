{% extends "base.html" %}

{% block title %}Quên mật khẩu{% endblock %}

{% block content %}
<section class="card auth-card">
  <div class="card-header">
    <h1>Quên mật khẩu</h1>
    <p class="subtitle">Nhập email để nhận đường dẫn đặt lại mật khẩu.</p>
  </div>

  <div id="alertBox" class="alert-box"></div>

  <form id="forgotForm" class="form-grid">
    <label class="form-label">Email</label>
    <input type="email" name="email" class="form-input" placeholder="email@example.com" required>
    <button type="submit" class="button button-primary">Gửi yêu cầu</button>
  </form>

  <div class="footnote">
    Quay lại <a href="/login">Đăng nhập</a>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/forgot_password.js"></script>
{% endblock %}
