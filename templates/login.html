{% extends "base.html" %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}
<section class="card auth-card">
  <div class="card-header">
    <h1>Đăng nhập</h1>
    <p class="subtitle">Đăng nhập bằng username hoặc email và mật khẩu của bạn.</p>
  </div>

  <div id="alertBox" class="alert-box"></div>

  <form id="loginForm" class="form-grid">
    <label class="form-label">Username / Email</label>
    <input type="text" name="login" class="form-input" placeholder="Username hoặc email" required>

    <label class="form-label">Mật khẩu</label>
    <input type="password" name="password" class="form-input" placeholder="Mật khẩu" required>

    <button type="submit" class="button button-primary">Đăng nhập</button>
  </form>

  <div class="footnote">
    Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/login.js"></script>
{% endblock %}
